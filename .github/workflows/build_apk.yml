name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.10
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            python3-pip build-essential \
            libltdl-dev libgdbm-dev libnss3-dev \
            libreadline-dev libsqlite3-dev wget curl lzma

      # 4. Set JAVA_HOME
      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV
          java -version

      # 5. Install Android SDK with STABLE build-tools only
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip \
            -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools \
             $HOME/android-sdk/cmdline-tools/latest

          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin

          # Accept all licenses
          yes | sdkmanager --licenses > /dev/null 2>&1

          # Install ONLY stable versions — no RC packages
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

          # Verify aidl exists
          echo "--- Verifying AIDL ---"
          find $HOME/android-sdk/build-tools -name "aidl"

          # Set env vars for all subsequent steps
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "$HOME/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      # 6. Install Buildozer + Cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37 virtualenv

      # 7. Cache ONLY Buildozer downloads (NOT the sdk — avoids stale RC tools)
      - name: Cache Buildozer downloads
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/cache
          key: buildozer-cache-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v4
          restore-keys: |
            buildozer-cache-${{ runner.os }}-

      # 8. Pre-configure Buildozer to use YOUR SDK (not download its own)
      - name: Configure Buildozer to use existing SDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          # Symlink so Buildozer finds the SDK we already installed
          ln -sfn $HOME/android-sdk \
            ~/.buildozer/android/platform/android-sdk
          ln -sfn $HOME/android-sdk/ndk/25.2.9519653 \
            ~/.buildozer/android/platform/android-ndk-r25b

          # Confirm buildozer.spec has correct settings
          grep -E "android\.(sdk|ndk|api|build_tools)" buildozer.spec

      # 9. Build the APK
      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug 2>&1 | tee build.log
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          # Force Buildozer to use our pre-installed SDK
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # 10. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ConstructionManagerPro-debug
          path: bin/*.apk
          retention-days: 14

      # 11. Upload build log on failure
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      # 12. Done
      - name: Done
        run: |
          ls -lh bin/*.apk
          echo "✅ APK ready — download
