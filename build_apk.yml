name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:      # allows manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install system dependencies for Buildozer
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            python3-pip build-essential \
            libltdl-dev

      # 4. Install Buildozer + Cython
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # 5. Cache .buildozer directory (speeds up subsequent builds)
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # 6. Build the debug APK
      - name: Build APK
        run: |
          buildozer -v android debug
        env:
          ANDROID_SDK_ROOT: /opt/android/sdk   # Buildozer manages its own SDK

      # 7. Upload the APK as a downloadable artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConstructionManagerPro-debug
          path: bin/*.apk
          retention-days: 14

      # 8. Optional: print APK info
      - name: APK info
        run: |
          ls -lh bin/*.apk
          echo "✅ APK build complete. Download from the Actions artifacts tab."
